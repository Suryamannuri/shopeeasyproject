spring.application.name=eccomercesspringboot

# Render dynamically assigns a port, falling back to 8080 locally
server.port=${PORT:8080}

# Database Connection (Render Environment Variables)
# If DB_URL is not provided on Render, it defaults to a local MySQL setup
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/eSpringproject?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Modernized Dialect (Fixes the deprecated MySQL8Dialect)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect